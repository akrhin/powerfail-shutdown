version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - os.Remove
        - (io.Closer).Close
        - (net/http.Response).Body.Close
    gosec:
      excludes:
        - G204  # Subprocess launched with variable — by design (qm/pct)
        - G304  # File path — config file path is trusted
        - G301  # Directory permissions — /etc/powerfail, fine
        - G302  # File permissions — flag files, fine
        - G306  # WriteFile permissions — systemd units need 0644
        - G101  # Hardcoded credentials — example config only

formatters:
  enable:
    - gofmt

run:
  timeout: 5m
  tests: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
