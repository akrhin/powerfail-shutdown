name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=5m

  vulncheck:
    name: Vuln Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  secrets-scan:
    name: Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true
      - name: Install dependencies
        run: go mod download
      - name: Run tests
        run: go test -v -cover -race -count=1 ./...

  build:
    name: Build
    needs: [lint, vulncheck, secrets-scan, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true
      - name: Build binaries
        run: make build-all
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: powerfail-agent
          path: bin/*

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: powerfail-agent
          path: release/

      - name: Prepare release assets
        run: |
          chmod +x release/powerfail-agent-linux-*
          cp deploy/install.sh release/
          cp powerfail.toml.example release/
          # Also pack a tar.gz for manual download
          cd release
          tar czf powerfail-agent-linux-amd64.tar.gz \
            powerfail-agent-linux-amd64 install.sh powerfail.toml.example
          tar czf powerfail-agent-linux-arm64.tar.gz \
            powerfail-agent-linux-arm64 install.sh powerfail.toml.example

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
