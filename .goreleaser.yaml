version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: powerfail-agent
    main: ./cmd/agent
    binary: powerfail-agent
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ if eq .Os "linux" }}Linux{{ end }}_{{ if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    files:
      - powerfail.toml.example
      - deploy/*

# Standalone binaries for curl-based install
universal_binaries:
  - ids: [powerfail-agent]
    replace: true

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: akrhin
    name: powerfail-shutdown
  extra_files:
    - glob: deploy/install.sh
    - glob: powerfail.toml.example
